body:
  text: 錢氐私志某向聞父兄說神廟熙寧間宣諭宰相王岐公云昭陵二女皆朕之姑卿可選勳賢之後有福者尚之岐公未有以奉詔㑹大父寶閣知台州回先王補試入太學適與岐公之子敏甫同齊敏甫告岐公云近有一錢少監子風骨不羣文采富贍恐可奉詔岐公遂就啓聖院設齊令敏甫盡召同舍飯罷岐公㑹茶熟視先王甚久皆不喻其意翼日又令敏甫竊取所業携以進御云臣向奉詔選勳賢之後尚主今得吳越王錢某之孫與臣男同齊得其所業又奏啓聖親見之事乞賜召見上云待共太皇商量後數日有㫖令三班奉職曹詩進士錢某又一人忘其姓名於某月日伺候宣押曹詩以本色服先王服布衣巳時候內侍宣押入內至一小殿殿內皆宫嬪兩貴主在焉引曹與先王立於簾前斯須上小帽領背出簾外熟視云簾外與簾內一般顧左右令止御樂聽聖㫖簾內宫人傳㫖錢某可尚慶夀公主曹詩可尚永夀公主引入幕次更衣各賜襲衣玉帶服所賜畢引至殿下謝恩殿上軸簾慈聖裕陵宣仁欽聖同坐慈聖謂曹詩曰你是我姪曾見拊先王背曰錢郎好女壻上云是箇享福節度使左右宫妃觀者如堵上同三殿徐登步輦還內樂聲漸逺復引先王與曹詩再入幕次賜酒五行執事皆宫人酒罷內侍復引至宫門各以仗下御馬一匹崇政殿親從官共十人導歸第謂之宣繫玉帶赴朝三日除正刺史却繫方金御仙花帶赴朝參踰年賢穆下降三殿護送就第太常鹵薄迎引故事下降後三日貴主同副車詣景靈宫及入內謝畢方見舅姑舊例貴主畫堂垂簾坐舅姑拜於簾外賢穆奏乞行常人禮上與慈聖大喜再三稱歎詔從所請上令中使宣諭宰執嘉其賢德次日宰執殿上稱賀賢穆乳母永嘉董夫人一日入禁中慈聖問云主以未得子為念為甚不去玉仙聖母處求嗣董奏云都尉不信須是官家娘娘處分後數日先王入禁中上笑云董婆來娘娘處說都尉來先王皇恐謝罪欽聖云别沒事只是娘娘要教公主去玉仙求嗣董奏云都尉不信先王奏云既得聖㫖安得不信遂擇日與賢穆同詣玉仙止留知觀老道士一人祝香祈禱道士見貴主車服之盛歆艷富貴云願得貧道與大主做兒子歸而有娠明年四月十五日先王欲赴朝賢穆云我昨夜夢見玉仙觀知觀來與我做兒子亟遣人詣廟祈禱且問道士動靜云知觀自去年大主上廟後便不安不下床多日矣知觀在房內聞人聲問云甚處人來報云錢大主臨蓐齎香燭祈禱笑云來催我也是日告殂大父寶閣善推步午時遣人來報先王云若今日酉時生是箇有福節度使伯兄果酉時生平生淡薄享夀七十有九忠懿歸朝同三子建節後先王與三兄建節先王兩移鎮南北兩第有十節堂節度使至團練使皆賜牌印旌節自開封府妓樂百戲迎引望闕設香案列旌節於拜褥兩傍官誥牌印皆置案上初拜交旌再拜交節是日諸處街司以至市井遊手前後傳呼謂之搶節至少三五千人犒賞大有所費猶藩鎮遺風也富者得之則為榮安定王德麟一生貧苦臨終建節幾破家焉賢穆有荆雍大長公主牌印金鑄也金鞍勒瑪瑙鞭金撮角紅藤下馬杌子聞國初貴主猶乘馬元祐以後不鑄印亦無乘馬儀物賢穆一日開小金合有玉佛兒十數枚大者如錢小者如指面某問何用賢穆云仁皇每日頭上戴一枚大者幞頭帽子裏戴小者冠子裏戴嘗言我無德每日人呼萬歲教佛當之畫堂上有開八藻井五色彩畫花磚砌地屏風畫白澤圖左設通硃五明金撮角椅子茶床排當即施用銀右設黑光五明金鈸銀撮角椅子茶床排當即施用銀子孫兩向分昭穆坐服用之物酒食器外如洗潄之類賢穆者金先王者銀未嘗錯亂皆遵李和文家風前輩主第毫髮不敢妄也歐文忠任河南推官親一妓時先文僖罷政為西京留守梅聖俞謝希深尹師魯同在幕下惜歐有才無行共白於公屢微諷而不之恤一日宴於後圃客集而歐與妓俱不至移時方來在坐相視以目公責妓云末至何也妓云中暑往凉堂睡著覺而失金叉猶未見公曰若得歐陽推官一詞當為賞汝歐即席云栁外輕雷池上雨雨聲滴碎荷聲小樓西閣斷虹明欄干倚遍待得月華生燕子飛來棲畫棟玉鈎垂下簾旌凉波不動簟紋平水晶雙枕旁有墮叉橫坐皆稱善遂命妓滿酌賞歐而令公庫償其失叉咸謂歐當少戢不惟不恤翻以為怨後修五代史十國世家痛毀吳越又於歸田録中說先文僖數事皆非美談從祖希白嘗戒子孫毋得勸人隂事賢者為恩不賢者為怨歐後為人言其盜甥表云喪厥夫而無托携孤女以來歸張氏此時年方七歲內翰伯見而笑云年方七歲正是學簸錢時也歐詞云江南柳葉小未成隂人為絲輕那忍折鶯憐枝嫩不勝吟留取待春深十四五閒抱琵琶尋堂上簸錢堂下走恁時相見已留心何况到如今歐知貢舉題目出通其變使民不倦乃云通其變而使民不倦賢良作唱曰試官偏愛外生而於是科場大閧皆報東門之役也親王宰相使相歲賜公使錢七千貫許造酒主第亦然李和文家酒名金波吾家酒名清淳王晉卿家碧香蔡曾公家君臣慶㑹秦師垣家表勳皆賜名其餘不能盡記婦翁說岐公在翰苑時中秋有月上問當直學士是誰左右以姓名對命小殿對設二位召來賜酒公至殿側侍班俄頃女童小樂引步輦至宣學士就坐公奏故事無君臣對坐之禮乞正其席上云天下無事月色清美與其醉聲色何如與學士論文若要正席則外廷賜宴正欲略去苛禮放懷飲酒公固請不已再拜就坐上引謝莊賦李白詩稱美其才又出御製詩示公公嘆仰聖學髙妙每起謝必勑內侍挾掖不令下拜夜漏下三鼓上悅甚令左右宫嬪各取領巾裙帶團扇手帕求詩內侍奉牙床以金箱水晶硯珊瑚筆格玉管筆皆上所用者於公前來者應之略不停綴都不蹈襲前人盡出一時新意仍稱其所長如美目者必及盼睞人人得其歡心悉以進呈上云豈可虗辱須與學士潤筆遂各取頭上珠花一朵裝公幞頭簮不盡者置公服袖中宫人旋取針線縫聨袖口宴罷月將西沉上命撤金蓮燭令內侍扶掖歸院翼日問學士夜來醉否奏云雖有酒不醉到玉堂不解帶便上床取幞頭在面前抱兩公服袖坐睡恐失花也都下盛傳天子請客明年中秋公已參政蔡確為學士上講故事命宫嬪求詩蔡奏云不敢遂命出公舊作蔡云臣才思短澀不及王某酒再行而止左右不悅云這箇學士剌撒又上鍾愛一公主七歲而薨親送殯宫歸路悲甚命宫門外再設祭命公作祭文公度起草不及乃就馬上自書祝版云唯主如氷如雪如花如月氷散雪消花殘月缺嗚呼哀哉尚饗皆服其敏辨得體在相位御樓觀燈同列謂公主上或索詩用甚故事公云只是鰲山鳳輦同列以為相薄洎進詩云雪消華月滿仙臺萬燭當樓寶扇開五鳳雲中扶輦下六鰲海上駕山來鎬京春酒沾周宴汾水秋風陋漢才一曲升平人共樂君王又進紫霞杯時髙麗賀正旦禮中有紫霞杯五色玻璃也是夕上用進酒同列始服岐公王禹玉也徽皇聞米元章有字學一日於瑶柱殿綳絹圖方廣二丈許設瑪瑙研李廷圭墨牙管筆金硯匣玉鎮紙水瓶召米書之上垂簾觀看令梁守道相伴賜酒米乃反繫袍袖升高陟上跳躍便捷落筆如雲龍蛇飛動聞上在簾下回顧抗聲云竒絶陛下上大喜盡以研匣鎮紙之屬賜之尋除書學博士一日崇政殿對事畢手執劄子上顧視令留椅子上米乃顧朵殿云皇帝呌內侍要唾盂閣門彈奏上云俊人不可以禮法拘一日見蔡魯公蔡云元章書法之妙今日可謂第一龜山須還他曼卿佛碑為第一米曰恁地時龜山却且做第二米有孔子贊曰孔子孔子大哉孔子孔子以前未有孔子孔子以後更無孔子孔子孔子大哉孔子黃魯直笑謂元章云公贊合黜落既不見題又且奚落誰也郭𫝊師太尉說曹南院知渭州夏人撓邉有智將靺鞨與渭對壘麾下十餘萬夏歲遣數百騎精鋭覘視兩界曹患靺鞨智勇遣遊騎伺彼巡邉兵來適靺鞨踰月病不能起曹乃於界首設一大祭賻贈器物照耀原野用祝版云大宋具位曹某昭告於夏國都護某人公纍以蠟書約提所部歸我大宋我待公之來不期忽喪吉人事無終始令百騎守祭望其兵近即舉火燒之并所用銀器千餘兩悉皆棄而遁歸夏兵悉掠祝版祭器而去後旬月夏國殺靺鞨其下二十餘帳反側不安率衆內叛拓地數百里獲生口數萬羊馬槖駝不可勝計蔡魯公帥成都一日於藥市中遇一婦人多髮如畫者毛女謂蔡云三十年後相見言訖不知所在蔡後以太師魯國公致仕居京師一日在相國寺資聖閣下納凉一村人自外突入直至蔡前云毛女有書蔡接書其人忽不見啓封大書東明二字蔡不曉其意後貶長沙死於東明寺因就菆焉吕辨者蔡門人蔡罷珠履盡散獨吕送至長沙乘間問蔡云公髙明逺識洞鑒古今知國家之事必至於斯乎答云非不知也將謂老身可以幸免徐神翁自海陵到京師蔡謂徐云且喜天下太平是時河北盜賊方定徐云太平天上方多遣魔軍下界託生人間作壞世界蔡云如何得識其人徐笑云太師亦是紹興間吳山下有大井每年有落水死者董德之太尉率衆作大方木以石版蓋合井口止能下水桶遂無損人之患有人夜行聞井中呌出錢者云你幾箇怕壞了活人我幾箇幾時托生不可謂無鬼也東坡在惠州其家居江浙以地逺無人致書為憂有道人卓契順者慨然嘆曰惠州不在天上行即到矣因請書以行佛印因致書云常讀退之送李願歸盤谷序願不遇知於在上者猶能坐茂樹以終日子瞻中大科登金門上玉堂逺於寂寞之濵權臣忌子瞻為宰相耳人生一世間如白駒之過隙二三十年功名富貴轉盼成空何不一筆勾斷尋取自家本來面目萬劫常往永無墮落縱未得到如來地亦可以驂駕鸞鶴翶翔三島為不死人何乃膠柱守株待入惡趣昔有問師法在甚麼處師云在行住坐卧處著衣喫飯處痾尿刺溺處沒理沒㑹處死活不得處子瞻胸中有萬卷書筆下無一㸃塵到這地位不知性命所在一生聰明要做甚麼三世諸佛只是一箇有血性的漢子子瞻若能腳下承當把一二十年富貴功名賤如泥土努力向前珍珍重重也又傳是正喬書唐一行曾語人曰吾得古人相法相人之法以洪範五福六極為主觀其所由察其所安可得大槩若其人忠孝仁義所作所為言行相應顛沛造次必歸於善者吉人也若不忠不孝不仁不義言行不相應顛沛造次必歸於惡者凶人也吉人必獲五福之報凶人必獲六極之刑縱不在其身必在子孫不但於風骨氣色中料其前程休咎也荆公舉一酒令云有客姓任名稔販金及錦關吏止之曰任稔任入金錦禁急又字謎云目字加兩㸃不得作貝字猜貝字缺二㸃不得作目字猜賀資二字也又四箇口盡皆方十字在中央不得作田字道不得作器字商圖字也燕北風俗不問士庶皆自稱小人宣和間有遼國右金吾衛上將軍韓正歸朝授檢校少保節度使與諸兄同正任班對中人以上說話即稱小人中人以下即稱我家每日到漏舍誦天童經數十遍其聲朗朗然且云對天童豈可稱我自皇天生我皆改為小人云皇天生小人皇地載小人日月照小人北斗輔小人前後二十餘句應稱我字皆改為小人誦畢贊嘆云這天童極靈聖王才元少師云若無靈聖如何持得許多小人然小人有母皆嘗小人之食小人之稱其來古矣施之於經是可笑也隆興初賀子忱知樞密院有武臣陳理功賞稱從軍三十餘年纍立戰功宣和年第一次燕山府立功靖康年第二次白溝河立功第三次黃河立功第四次京城立功建炎年第五次海州立功第六次揚州立功紹興年第七次瓜州立功第八次和州立功第九次太平州立功辭氣不平謂朝廷推賞一次輕如一次賀正色云只為邉面一次近如一次武臣無詞聞者稱服宋相郊居政府上元夜至書院內讀周易聞其弟學士祁㸃華燈擁歌妓醉飲達旦翌日喻所親令誚讓云相公寄語學士聞昨夜燒燈夜宴窮極奢侈不知記得某年上元同在某州州學內喫虀煮飯時否學士笑曰却須寄語相公不知某年同在某處州喫虀煮飯是為甚底元豐間宋閣使者善人倫上知而問云朕相如何對云陛下天日之表神明之格下臣不得而名又問王安石云牛行虎視牛行足以任重虎視足以威逺又問卿如何曰臣草木之質瓦礫之資陛下用之則貴不用之則賤張天覺丞相再召到闕謝表云十年去國門前之雀可羅一日還朝屋上之烏亦好後有一達官效顰云十年去國不聞長樂之鐘一日還朝始見大君之鼎謂見魏漢津所鑄九鼎也明節劉后一時遭遇寵傾六宮忽苦痁疾臨終戒左右云我有遺囑在領巾上候我氣絶奏官家親自來解語畢而終左右馳奏上至哀慟悲不自勝領巾上蠅頭細字其辭云妾出身微賤而無寸長一日幸遭遇聖恩得與嬪御之列命分寒薄至此夭折雖埋骨於九泉魂魄不離左右切望陛下以宗廟社稷之重天下生靈之衆大王帝姬之多不可以賤妾一人過有思念深動聖懷視後宫萬計勝如妾者不少妾深欲忍死面與君父訣别謫限已盡不得少留寃痛之情言不能盡淚下有數百㸃悲切之言不能盡記自後左右每寬解必提著領巾上愈傷感聞者謂李夫人不足道也林靈素謂后是九華安妃臨終聞本殿異香音樂次年有青城術士見后於巫山髣佛鈿合金叉之異真非常人也
