body:
  text: 錢氏私志小説家類一雜事之屬提要臣等謹案錢氏私志一卷舊本或題錢彥逺撰或題錢愐撰或題錢世昭撰錢曾讀書敏求記定為錢愐其説曰愐為彭城王第三子昭陵之甥故記熙寧尚主玉仙求嗣事獨詳其稱大父寶閣知台州回者乃冀國公諱暄字載陽以父蔭纍官駕部郎中知撫州移台州進少府監權鹽鐡副使時也彭城王諱景臻字道邃冀國公第九子建炎二年追封故稱先王俗子以為起居舍人彥逺之筆不知彥逺乃忠遜之孫翰林學士易之子與彭城為再從叔姪世次犂然安得反有先王之稱今考錢氏世系俶倧同為武肅王鏐之孫景臻乃俶之曾孫彥逺為倧之孫若此書為彥逺所著則景臻乃其猶子不得稱先王也曾所辨良是然此書前有錢世昭序謂叔父太尉昭陵之甥凡耳目之所接事出一時語流千載者皆廣記而備言之世昭敬請其説得數萬言敘而集之名曰錢氏私志據此則是書固非彥逺所為亦非盡愐所纂蓋愐嘗記所聞見而世昭敘而集之爾序稱叔父太尉則世昭愐之猶子也宋史秦魯國大長公主本傳主為仁宗第十四女以延祐五年封慶夀即是書所云錢某可尚慶夀公主而通考前列秦魯國大長公主適錢景臻後列慶夀公主云不言所適則以慶夀公主與秦魯國大長公主分為二人證以是書與宋史相合可知通考之誤惟其以五代史吳越世家歸田録貶斥錢氏之嫌詆歐陽修甚力似非公論然其末自稱皆報東門之役則亦不自諱其挾怨矣乾隆四十五年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀錢氏私志原序叔父太尉昭陵之甥親見宣政太平文物之懿逮事太上備膺眷遇其在帝左右銜命出疆凡耳目之所接事出一時語流千載者皆廣記而備言之世昭敬請其説得數萬言敘而集之名曰錢氏私志云姪迪功郎新秀州嘉興縣尉世昭謹序
